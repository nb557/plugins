name: Sync Upstream

env:
  UPSTREAM_URL: "https://github.com/nb557/plugins.git"
  UPSTREAM_BRANCH: "main"
  DOWNSTREAM_BRANCH: "main"  # Явно указываем вашу ветку
  MERGE_ARGS: "--strategy-option ours"

on:
  schedule:
    - cron: '1 18 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: GitHub Sync to Upstream Repository
        uses: dabreadman/sync-upstream-repo@v1.3.0
        with: 
          upstream_repo: ${{ env.UPSTREAM_URL }}
          upstream_branch: ${{ env.UPSTREAM_BRANCH }}
          downstream_branch: ${{ env.DOWNSTREAM_BRANCH }}
          token: ${{ secrets.GITHUB_TOKEN }}  # ✅ Используем GITHUB_TOKEN
          merge_args: ${{ env.MERGE_ARGS }}
